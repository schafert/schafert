name: Sync publications from BibTeX

# Runs automatically whenever LifeWork.bib is updated on the main branch.
# Also available to trigger manually from the GitHub Actions tab.
on:
  push:
    branches: [main, master]
    paths:
      - 'content/publication_list/LifeWork.bib'
  workflow_dispatch:   # lets you click "Run workflow" in the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      # Cache R packages so repeated runs are fast (~30 s vs. ~5 min)
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}-v1
          restore-keys: ${{ runner.os }}-r-

      - name: Install R dependencies
        run: |
          install.packages(c("RefManageR", "dplyr", "stringr", "anytime", "stringi"),
                           repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Generate publication .md files
        run: Rscript R/generate_pubs.R

      - name: Commit and push any changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publication/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: sync publications from LifeWork.bib [skip ci]"
          git push
